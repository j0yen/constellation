---
# Ansible role: constellation-headscale
#
# Provisions and operates a Headscale control plane on the cloud node.
# State lives on a persisted path; secrets come from the pass(1) store.
#
# ACs covered:
#   AC1  — systemd service + state on persisted path (durable across restart)
#   AC2  — noise key loaded from constellation-secrets; never generated in repo
#   AC3  — ACL/policy derived from mesh's canonical acl-policy.hujson
#   AC5  — status command wired via the helper scripts
#   AC9  — minimal bind surface (loopback only; nftables enforces perimeter)

# ---------------------------------------------------------------------------
# 0. Guard: cloud-group only
# ---------------------------------------------------------------------------
- name: Assert this role runs on the cloud group only
  ansible.builtin.assert:
    that: "'cloud' in group_names"
    fail_msg: >
      headscale role must be applied to hosts in the [cloud] inventory group.

# ---------------------------------------------------------------------------
# 1. Create system user + directories
# ---------------------------------------------------------------------------
- name: Create headscale system user
  ansible.builtin.user:
    name: "{{ headscale_user }}"
    group: "{{ headscale_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ headscale_state_dir }}"
    create_home: false
  become: true

- name: Create headscale directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ headscale_user }}"
    group: "{{ headscale_group }}"
    mode: "{{ item.mode }}"
  loop: "{{ headscale_dirs }}"
  become: true

# ---------------------------------------------------------------------------
# 2. Install headscale binary
# ---------------------------------------------------------------------------
- name: Check current headscale version
  ansible.builtin.command: "{{ headscale_bin }} version"
  register: _hs_current_version
  changed_when: false
  failed_when: false

- name: Download headscale binary
  ansible.builtin.get_url:
    url: "{{ headscale_release_url }}"
    dest: "{{ headscale_bin }}"
    mode: "0755"
    owner: root
    group: root
  become: true
  when: >
    _hs_current_version.rc != 0 or
    headscale_version not in _hs_current_version.stdout
  notify: Restart headscale

# ---------------------------------------------------------------------------
# 3. Noise key — from the secrets store (AC2)
# ---------------------------------------------------------------------------
- name: Fetch headscale noise private key from pass store
  # Runs on the Ansible controller (localhost), never written to disk.
  ansible.builtin.command:
    cmd: pass show {{ headscale_noise_key_pass_path }}
  delegate_to: localhost
  run_once: false
  no_log: true
  register: _hs_noise_key_result
  changed_when: false
  # NOTE: If the key doesn't exist yet, run:
  #   headscale generate private-key | pass insert constellation/headscale/noise-private-key
  # on first deploy. This task will fail gracefully if the path is absent.
  failed_when: false

- name: Write noise private key to state dir (no_log, permissions 0600)
  ansible.builtin.copy:
    content: "{{ _hs_noise_key_result.stdout | trim }}"
    dest: "{{ headscale_noise_key_file }}"
    owner: "{{ headscale_user }}"
    group: "{{ headscale_group }}"
    mode: "0600"
  become: true
  no_log: true
  when: _hs_noise_key_result.rc == 0 and _hs_noise_key_result.stdout | trim | length > 0
  notify: Restart headscale

- name: Warn if noise key not found in pass store
  ansible.builtin.debug:
    msg: >
      WARNING: headscale noise key not found at {{ headscale_noise_key_pass_path }}.
      Run 'headscale generate private-key | pass insert {{ headscale_noise_key_pass_path }}'
      and re-run this play to write the key.
  when: _hs_noise_key_result.rc != 0 or _hs_noise_key_result.stdout | trim | length == 0

# ---------------------------------------------------------------------------
# 4. ACL/policy — copy from mesh canonical source (AC3)
# ---------------------------------------------------------------------------
- name: Copy canonical fleet ACL from mesh to headscale config
  ansible.builtin.copy:
    src: "{{ headscale_acl_src }}"
    dest: "{{ headscale_acl_file }}"
    owner: "{{ headscale_user }}"
    group: "{{ headscale_group }}"
    mode: "0640"
  become: true
  notify: Reload headscale

# ---------------------------------------------------------------------------
# 5. Main configuration file (AC9 — loopback bind only)
# ---------------------------------------------------------------------------
- name: Deploy headscale config
  ansible.builtin.template:
    src: headscale-config.yaml.j2
    dest: "{{ headscale_config_file }}"
    owner: "{{ headscale_user }}"
    group: "{{ headscale_group }}"
    mode: "0640"
  become: true
  notify: Restart headscale

# ---------------------------------------------------------------------------
# 6. systemd unit
# ---------------------------------------------------------------------------
- name: Deploy headscale systemd unit
  ansible.builtin.template:
    src: headscale.service.j2
    dest: /etc/systemd/system/headscale.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart headscale

- name: Enable and start headscale
  ansible.builtin.systemd:
    name: headscale
    enabled: true
    state: started
    daemon_reload: true
  become: true

# ---------------------------------------------------------------------------
# 7. Create fleet user in headscale (idempotent) (AC4)
# ---------------------------------------------------------------------------
- name: Check if fleet user exists in headscale
  ansible.builtin.command: "{{ headscale_bin }} users list -o json"
  register: _hs_users
  changed_when: false
  become: true
  become_user: "{{ headscale_user }}"
  failed_when: false

- name: Create headscale fleet user
  ansible.builtin.command: "{{ headscale_bin }} users create {{ headscale_fleet_user }}"
  become: true
  become_user: "{{ headscale_user }}"
  when: >
    _hs_users.rc == 0 and
    headscale_fleet_user not in (_hs_users.stdout | default(''))

# ---------------------------------------------------------------------------
# 8. Assert state durability (AC1): DB file exists after service start
# ---------------------------------------------------------------------------
- name: Wait for headscale to initialize DB
  ansible.builtin.wait_for:
    path: "{{ headscale_db_path }}"
    state: present
    timeout: 30

- name: Assert DB file exists (state durability)
  ansible.builtin.stat:
    path: "{{ headscale_db_path }}"
  register: _hs_db_stat

- name: Fail if DB missing after start
  ansible.builtin.fail:
    msg: "Headscale DB not found at {{ headscale_db_path }} after service start."
  when: not _hs_db_stat.stat.exists

# ---------------------------------------------------------------------------
# 9. Deploy helper scripts
# ---------------------------------------------------------------------------
- name: Deploy constellation headscale helper scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /usr/local/bin/{{ item | basename }}
    owner: root
    group: root
    mode: "0755"
  become: true
  loop:
    - files/constellation-headscale
    - files/headscale-preauth.sh
    - files/headscale-status.sh
    - files/headscale-selftest.sh
    - files/headscale-node.sh
