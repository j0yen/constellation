---
- name: Restart nats-server
  ansible.builtin.systemd:
    name: nats-server
    state: restarted
    daemon_reload: true

- name: Reload nats-server
  ansible.builtin.systemd:
    name: nats-server
    state: reloaded

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Reload nftables
  ansible.builtin.systemd:
    name: nftables
    state: reloaded
