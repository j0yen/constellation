---
# secrets role tasks — install constellation-secrets helper and render EnvironmentFiles
# before any bus / mesh / brain units start.
#
# ORDERING: This role MUST run before roles that start wm-busbridge, mesh, or brain
# units. In site.yml, include it after 'base' but before 'cloud'/'voice'.
# Units that consume secrets should declare:
#   After=constellation-secrets-render.service
#   Requires=constellation-secrets-render.service

# ---------------------------------------------------------------------------
# 0. Install prerequisites (age + sops)
# ---------------------------------------------------------------------------
- name: Install age and sops packages
  community.general.pacman:
    name:
      - age
      - sops
    state: present
  tags: [secrets, packages]

# ---------------------------------------------------------------------------
# 1. Deploy constellation-secrets helper
# ---------------------------------------------------------------------------
- name: Ensure /usr/local/bin exists
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy constellation-secrets helper
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../bin/constellation-secrets"
    dest: "{{ secrets_bin }}"
    owner: root
    group: root
    mode: "0755"
  tags: [secrets]

# ---------------------------------------------------------------------------
# 2. Deploy the encrypted secrets tree
# ---------------------------------------------------------------------------
- name: Ensure secrets root directory exists (0700, root only)
  ansible.builtin.file:
    path: "{{ secrets_root }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: [secrets]

- name: Sync encrypted secrets tree to host
  ansible.builtin.synchronize:
    src: "{{ playbook_dir }}/../secrets/"
    dest: "{{ secrets_root }}/"
    delete: true
    rsync_opts:
      - "--exclude=*.bak"
      - "--exclude=README.md"
  tags: [secrets]

- name: Secure secrets tree permissions (ciphertext only, root-readable)
  ansible.builtin.shell: |
    find "{{ secrets_root }}" -type f -name "*.yaml" -exec chmod 600 {} \;
    find "{{ secrets_root }}" -type d -exec chmod 700 {} \;
  changed_when: false
  tags: [secrets]

# ---------------------------------------------------------------------------
# 3. Render EnvironmentFile (secrets → /run/constellation/)
# ---------------------------------------------------------------------------
- name: Create secure runtime directory for rendered secrets
  ansible.builtin.file:
    path: "{{ secrets_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: [secrets]

- name: Check each required secret is decryptable (fail-fast gate)
  ansible.builtin.shell: >
    CONSTELLATION_SECRETS_ROOT="{{ secrets_root }}"
    CONSTELLATION_ROLE="{{ constellation_role | default('') }}"
    {{ secrets_bin }} get --check "{{ item.secret }}"
  loop: "{{ constellation_secrets_map }}"
  when: secrets_require_all | bool
  changed_when: false
  tags: [secrets]

- name: Render inline secrets into EnvironmentFile entries
  ansible.builtin.shell: >
    set -o pipefail;
    val=$(CONSTELLATION_SECRETS_ROOT="{{ secrets_root }}"
          CONSTELLATION_ROLE="{{ constellation_role | default('') }}"
          {{ secrets_bin }} get "{{ item.secret }}");
    printf '%s=%s\n' "{{ item.env_var }}" "$val" >> "{{ secrets_env_dir }}/environment"
  loop: "{{ constellation_secrets_map }}"
  no_log: true
  changed_when: true
  tags: [secrets]

- name: Secure the rendered EnvironmentFile (0600, root only)
  ansible.builtin.file:
    path: "{{ secrets_env_dir }}/environment"
    owner: root
    group: root
    mode: "0600"
  tags: [secrets]

# ---------------------------------------------------------------------------
# 4. Install constellation-secrets-render.service (ordering anchor for consumers)
# ---------------------------------------------------------------------------
- name: Deploy constellation-secrets-render systemd unit
  ansible.builtin.template:
    src: constellation-secrets-render.service.j2
    dest: /etc/systemd/system/constellation-secrets-render.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  tags: [secrets, systemd]

- name: Enable constellation-secrets-render.service
  ansible.builtin.systemd:
    name: constellation-secrets-render.service
    enabled: true
    daemon_reload: true
  tags: [secrets, systemd]
