---
# defaults for the secrets role

# Path to the constellation-secrets helper on the target host
secrets_bin: /usr/local/bin/constellation-secrets

# Path to the constellation secrets tree on the target host
secrets_root: /opt/constellation/secrets

# Where to write the rendered EnvironmentFile (inside /run/user/$UID or /run)
# Set to a path under /run for system services.
secrets_env_dir: /run/constellation

# Host role — auto-detected by constellation-secrets if not set here
# constellation_role: laptop   # or: cloud

# List of secrets to render into the EnvironmentFile for this host's role.
# Each entry maps a secret name (in the store) to an env var name.
constellation_secrets_map:
  - secret: WM_ANTHROPIC_API_KEY
    env_var: WM_ANTHROPIC_API_KEY
  - secret: nats.creds
    env_var: WM_NATS_CREDS_FILE   # points to a path; see task below
  - secret: tailscale_authkey
    env_var: WM_TAILSCALE_AUTHKEY

# Whether to fail the play if a secret is absent (--check mode)
secrets_require_all: true
