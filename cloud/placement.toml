# cloud/placement.toml — constellation daemon placement classification
#
# Values:
#   "hub"        — always-on fleet hub (Hetzner CPX22, x86_64 AMD EPYC)
#   "node-local" — every node runs its own instance
#   (unset)      — placement TBD / out of scope
#
# Consumed by: wm-node should-run <daemon>
# See: cloud/docs/timer-placement.md for rationale.

# ---------------------------------------------------------------------------
# Timers
# ---------------------------------------------------------------------------
[timers]

# Fleet timers (relocated to hub — fire on schedule, not "when laptop is open")
roundtable = "hub"
roundtable-bind = "hub"
claude-self-review = "hub"
claude-review-due = "hub"
adopt-cron = "hub"
consign-drain = "hub"
claude-chaff = "hub"
trim-relief = "hub"
ballast-guard = "hub"

# Node-local timers (stay on every node — bound to local resources)
cloudbuild-watchdog = "node-local"  # kills stale Hetzner burst servers
ctrace-reap = "node-local"          # reaps local bpftrace tracers

# Aggregate lists (consumed by carbon-reminders-cloud classification gate)
fleet      = ["claude-self-review", "claude-review-due", "roundtable", "roundtable-bind", "adopt-cron", "consign-drain", "claude-chaff", "trim-relief", "ballast-guard"]
node_local = ["cloudbuild-watchdog", "ctrace-reap"]

# ---------------------------------------------------------------------------
# Subscriber daemons
# ---------------------------------------------------------------------------
[daemons]

# Hub-bound (must run 24/7; laptop sleeps corrupt cadence timing)
homeward-ingest = "hub"   # AIMD cadence loop — pulls shelter data
homeward-report = "hub"   # Owner report API (:8081)
homeward-embed  = "hub"   # DINOv2 FastAPI sidecar (Python/uv)

# Node-local (one per node, topology constraint)
wm-busbridge = "node-local"  # bridges this node's agorabus to NATS
wm-tether    = "node-local"  # fleet link supervisor

# Out of scope
# recalld = ???  # canonical agentic memory; placement TBD

# ---------------------------------------------------------------------------
# Subscribers (canonical classification used by carbon-subscribers-cloud PRD)
# ---------------------------------------------------------------------------
[subscribers]

# Hub-bound fleet subscribers (run 24/7 on hub; not laptop-local)
hub = ["homeward-ingest", "homeward-report", "homeward-embed"]

# Node-local subscribers (one per node, topology constraint)
node_local = ["wm-busbridge", "wm-tether"]

# Out of scope — placement TBD
unset = ["recalld"]
