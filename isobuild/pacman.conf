#
# constellation isobuild pacman.conf — used by mkarchiso when populating the
# installer's airootfs. Includes the local wintermute repo so the ISO carries the
# prebuilt linux-wintermute kernel without a per-build compile.
#
# This is the BUILD-HOST pacman.conf (mkarchiso reads it to fetch packages).
# The installed system's pacman.conf is airootfs/etc/pacman.conf.

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# ---------------------------------------------------------------------------
# Local wintermute repo — serves the prebuilt linux-wintermute kernel.
# Build the repo first with: constellation/localrepo/build-repo.sh
# Then point this Server at it (file:// on the build host, or http:// on a node).
# ---------------------------------------------------------------------------
[wintermute-local]
SigLevel = Optional TrustAll
Server = file:///srv/constellation/pkgs/$arch
